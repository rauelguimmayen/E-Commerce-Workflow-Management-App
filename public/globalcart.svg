<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="800" height="800" rx="40" fill="#ffffff"/>

  <!-- Speed lines -->
  <rect x="140" y="260" width="90" height="20" rx="10" fill="#1E88E5"/>
  <rect x="120" y="300" width="130" height="20" rx="10" fill="#1E88E5"/>
  <rect x="160" y="340" width="70" height="20" rx="10" fill="#1E88E5"/>

  <!-- Cart -->
  <path
    d="M240 220
       H320
       L360 460
       H560
       L620 280"
    fill="none"
    stroke="#002366"
    stroke-width="24"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Globe -->
  <circle cx="450" cy="320" r="120" fill="#1E88E5"/>

  <!-- Globe longitude lines -->
  <ellipse cx="450" cy="320" rx="40" ry="120"
           fill="none"
           stroke="white"
           stroke-width="10"/>

  <ellipse cx="450" cy="320" rx="85" ry="120"
           fill="none"
           stroke="white"
           stroke-width="10"/>

  <!-- Globe latitude lines -->
  <ellipse cx="450" cy="320" rx="120" ry="40"
           fill="none"
           stroke="white"
           stroke-width="10"/>

  <ellipse cx="450" cy="270" rx="100" ry="25"
           fill="none"
           stroke="white"
           stroke-width="10"/>

  <ellipse cx="450" cy="370" rx="100" ry="25"
           fill="none"
           stroke="white"
           stroke-width="10"/>

  <!-- Cart wheels -->
  <circle cx="390" cy="520" r="30" fill="#002366"/>
  <circle cx="550" cy="520" r="30" fill="#002366"/>

  <circle cx="390" cy="520" r="10" fill="white"/>
  <circle cx="550" cy="520" r="10" fill="white"/>

  <!-- Shadow -->
  <ellipse cx="470" cy="570" rx="180" ry="12"
           fill="#D6E2F0"
           opacity="0.5"/>

  <!-- Brand Text -->
  <text x="90" y="700"
        font-family="Arial, Helvetica, sans-serif"
        font-size="90"
        font-weight="700">

    <tspan fill="#002366">Global</tspan>
    <tspan fill="#1E88E5">Cart</tspan>

  </text>

</svg>